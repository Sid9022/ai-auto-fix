name: Supabase Keep-Alive

on:
  schedule:
    # Run every 5 days at midnight UTC
    - cron: "0 0 */5 * *"
  workflow_dispatch: # allows you to trigger manually from GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Auth
        run: |
          echo "Pinging Supabase Auth service..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "404" ]; then
            echo "⚠️ Ping failed"
            exit 1
          fi
          echo "✅ Supabase keep-alive ping succeeded"
